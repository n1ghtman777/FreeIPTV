name: Update NightTV Token Daily

on:
  schedule:
    - cron: '0 0 * * *' # Выполнять каждый день в полночь UTC

jobs:
  update-token:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Install Dependencies
        run: |
          pip install --upgrade setuptools wheel
          pip install -r requirements.txt # Если у вас есть требования
          
      - name: Run Script
        run: python scripts/auto_token_gen.py # Укажите путь к вашему скрипту
      
      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Update NightTV token" || echo "No changes to commit"
          git push origin main # Или нужный вам branch
